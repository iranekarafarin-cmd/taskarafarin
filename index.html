<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسک‌آفرین ۶</title>

<style>
/* ---------- متغیرهای رنگ (تم روشن) ---------- */
:root{
  --bg:#f1f5f9; --card:#ffffff; --text:#1e293b; --muted:#64748b;
  --line:#e2e8f0; --brand:#4f46e5; --brand2:#6366f1;
  --ok:#16a34a; --warn:#d97706; --bad:#dc2626; --shadow:0 2px 8px rgba(0,0,0,.08);
}
/* ---------- تم تاریک ---------- */
[data-theme="dark"]{
  --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8;
  --line:#334155; --brand:#818cf8; --brand2:#6366f1; --shadow:0 2px 8px rgba(0,0,0,.4);
}

*{box-sizing:border-box; margin:0; padding:0; font-family:Tahoma,"Segoe UI",sans-serif}
body{background:var(--bg); color:var(--text); min-height:100vh; transition:background .3s}

/* ---------- سربرگ ---------- */
header{background:var(--brand); color:#fff; padding:10px 14px; display:flex;
  align-items:center; gap:8px; flex-wrap:wrap; position:sticky; top:0; z-index:50}
header h1{font-size:18px; flex:1}
header button{background:rgba(255,255,255,.18); border:none; color:#fff;
  padding:7px 12px; border-radius:8px; cursor:pointer; font-size:13px}
header button:hover{background:rgba(255,255,255,.3)}

/* ---------- تب‌ها ---------- */
nav{display:flex; gap:4px; background:var(--card); padding:6px; overflow-x:auto;
  border-bottom:1px solid var(--line); position:sticky; top:48px; z-index:40}
nav button{flex:1; min-width:70px; border:none; background:none; color:var(--muted);
  padding:9px 6px; border-radius:8px; cursor:pointer; font-size:13px; white-space:nowrap}
nav button.active{background:var(--brand); color:#fff}

/* ---------- بخش‌ها ---------- */
main{padding:12px; max-width:1100px; margin:0 auto}
.tab{display:none}
.tab.show{display:block}

/* ---------- نوار جستجو و فیلتر ---------- */
.toolbar{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap}
.toolbar input,.toolbar select{padding:8px 10px; border:1px solid var(--line);
  border-radius:8px; background:var(--card); color:var(--text); font-size:13px}
.toolbar input{flex:1; min-width:140px}

/* ---------- بورد ---------- */
.board{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:10px}
.col{background:var(--card); border-radius:12px; padding:10px; box-shadow:var(--shadow);
  min-height:120px}
.col h3{font-size:14px; margin-bottom:8px; display:flex; justify-content:space-between}
.col .cnt{background:var(--line); border-radius:10px; padding:0 8px; font-size:12px}
.col.dragover{outline:2px dashed var(--brand)}

/* ---------- کارت وظیفه ---------- */
.task{background:var(--bg); border:1px solid var(--line); border-right:4px solid var(--brand);
  border-radius:10px; padding:9px; margin-bottom:8px; cursor:grab; font-size:13px}
.task:active{cursor:grabbing}
.task .t-title{font-weight:bold; margin-bottom:4px}
.task .t-meta{display:flex; gap:6px; flex-wrap:wrap; font-size:11px; color:var(--muted)}
.task.overdue{border-right-color:var(--bad)}
.task.done{opacity:.55; text-decoration:line-through}

/* برچسب رنگی */
.tag{padding:1px 8px; border-radius:10px; font-size:11px; color:#fff}

/* نوار پیشرفت زیروظیفه */
.prog{height:5px; background:var(--line); border-radius:5px; margin-top:6px; overflow:hidden}
.prog>div{height:100%; background:var(--ok); transition:width .3s}

/* دکمه‌های ریز روی کارت */
.t-btns{display:flex; gap:4px; margin-top:6px}
.t-btns button{border:none; background:var(--line); color:var(--text); border-radius:6px;
  padding:3px 8px; font-size:11px; cursor:pointer}

/* ---------- ماتریس آیزنهاور ---------- */
.matrix{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.quad{background:var(--card); border-radius:12px; padding:10px; box-shadow:var(--shadow); min-height:130px}
.quad h4{font-size:13px; margin-bottom:8px}
.q1 h4{color:var(--bad)} .q2 h4{color:var(--brand)}
.q3 h4{color:var(--warn)} .q4 h4{color:var(--muted)}

/* ---------- تقویم ---------- */
.cal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.cal-head button{border:none; background:var(--brand); color:#fff; border-radius:8px;
  padding:6px 14px; cursor:pointer}
.cal{display:grid; grid-template-columns:repeat(7,1fr); gap:4px}
.cal .dow{text-align:center; font-size:11px; color:var(--muted); padding:4px}
.day{background:var(--card); border:1px solid var(--line); border-radius:8px;
  min-height:64px; padding:4px; font-size:11px; cursor:pointer}
.day.today{border:2px solid var(--brand)}
.day .dnum{font-weight:bold; margin-bottom:2px}
.day .dot{background:var(--brand2); color:#fff; border-radius:6px; padding:1px 4px;
  margin-top:2px; display:block; overflow:hidden; white-space:nowrap; text-overflow:ellipsis}

/* ---------- داشبورد ---------- */
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:12px}
.stat{background:var(--card); border-radius:12px; padding:14px; text-align:center; box-shadow:var(--shadow)}
.stat b{font-size:26px; display:block}
.stat span{font-size:12px; color:var(--muted)}

/* ---------- فرم و مودال ---------- */
.overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100;
  align-items:center; justify-content:center; padding:12px}
.overlay.show{display:flex}
.modal{background:var(--card); border-radius:14px; padding:16px; width:100%;
  max-width:440px; max-height:88vh; overflow-y:auto}
.modal h3{margin-bottom:12px; font-size:16px}
.modal label{display:block; font-size:12px; color:var(--muted); margin:8px 0 3px}
.modal input,.modal select,.modal textarea{width:100%; padding:9px; border:1px solid var(--line);
  border-radius:8px; background:var(--bg); color:var(--text); font-size:13px}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.btn{width:100%; padding:11px; border:none; border-radius:9px; background:var(--brand);
  color:#fff; font-size:14px; cursor:pointer; margin-top:12px}
.btn.gray{background:var(--muted)}
.btn.red{background:var(--bad)}

/* لیست زیروظیفه در مودال */
.sublist{margin-top:6px}
.sublist div{display:flex; align-items:center; gap:6px; padding:4px 0; font-size:13px}

/* ---------- صفحه ورود ---------- */
#authBox{max-width:360px; margin:60px auto; background:var(--card); border-radius:14px;
  padding:22px; box-shadow:var(--shadow)}
#authBox h2{text-align:center; margin-bottom:14px}
#authMsg{font-size:12px; color:var(--bad); margin-top:8px; text-align:center}

/* دکمه شناور افزودن */
#fab{position:fixed; bottom:18px; left:18px; width:54px; height:54px; border-radius:50%;
  border:none; background:var(--brand); color:#fff; font-size:26px; cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.3); z-index:60}

/* موبایل */
@media(max-width:600px){
  .matrix{grid-template-columns:1fr}
  header h1{font-size:15px}
}
</style>
</head>
<body>

<!-- ================= صفحه ورود ================= -->
<div id="authBox">
  <h2>🗂️ تسک‌آفرین ۶</h2>
  <label>ایمیل</label>
  <input id="aEmail" type="email" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text)">
  <label style="display:block;margin-top:8px">رمز عبور (حداقل ۶ حرف)</label>
  <input id="aPass" type="password" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text)">
  <button class="btn" id="btnLogin">ورود</button>
  <button class="btn gray" id="btnSignup">ثبت‌نام جدید</button>
  <div id="authMsg"></div>
</div>

<!-- ================= برنامه اصلی (اول مخفی است) ================= -->
<div id="app" style="display:none">

  <header>
    <h1>🗂️ تسک‌آفرین ۶</h1>
    <button id="btnTheme" title="تغییر تم">🌙</button>
    <button id="btnNotif" title="فعال‌سازی یادآور">🔔</button>
    <button id="btnCsv">📄 خروجی</button>
    <button id="btnLogout">خروج</button>
  </header>

  <nav>
    <button data-tab="board" class="active">📋 بورد</button>
    <button data-tab="matrix">🎯 ماتریس</button>
    <button data-tab="cal">📅 تقویم</button>
    <button data-tab="dash">📊 داشبورد</button>
    <button data-tab="team">👥 تیم</button>
    <button data-tab="arch">🗃️ آرشیو</button>
  </nav>

  <main>

    <!-- ===== تب بورد ===== -->
    <section class="tab show" id="tab-board">
      <div class="toolbar">
        <input id="srch" placeholder="🔍 جستجو...">
        <select id="fltMember"><option value="">همه اعضا</option></select>
        <select id="fltTag"><option value="">همه برچسب‌ها</option></select>
      </div>
      <div class="board">
        <div class="col" data-st="todo"><h3>در انتظار <span class="cnt" id="c-todo">0</span></h3><div class="drop" id="l-todo"></div></div>
        <div class="col" data-st="doing"><h3>در حال انجام <span class="cnt" id="c-doing">0</span></h3><div class="drop" id="l-doing"></div></div>
        <div class="col" data-st="done"><h3>انجام شده <span class="cnt" id="c-done">0</span></h3><div class="drop" id="l-done"></div></div>
      </div>
    </section>

    <!-- ===== تب ماتریس آیزنهاور ===== -->
    <section class="tab" id="tab-matrix">
      <div class="matrix">
        <div class="quad q1"><h4>🔴 مهم و فوری — همین حالا</h4><div id="q1"></div></div>
        <div class="quad q2"><h4>🔵 مهم و غیرفوری — برنامه‌ریزی</h4><div id="q2"></div></div>
        <div class="quad q3"><h4>🟡 فوری و کم‌اهمیت — واگذاری</h4><div id="q3"></div></div>
        <div class="quad q4"><h4>⚪ نه مهم نه فوری — حذف</h4><div id="q4"></div></div>
      </div>
    </section>

    <!-- ===== تب تقویم شمسی ===== -->
    <section class="tab" id="tab-cal">
      <div class="cal-head">
        <button id="calPrev">◀ قبل</button>
        <b id="calTitle"></b>
        <button id="calNext">بعد ▶</button>
      </div>
      <div class="cal" id="calGrid"></div>
    </section>

    <!-- ===== تب داشبورد ===== -->
    <section class="tab" id="tab-dash">
      <div class="stats">
        <div class="stat"><b id="stAll">0</b><span>کل وظایف فعال</span></div>
        <div class="stat"><b id="stToday">0</b><span>موعد امروز</span></div>
        <div class="stat" style="color:var(--bad)"><b id="stLate">0</b><span>عقب‌افتاده</span></div>
        <div class="stat" style="color:var(--ok)"><b id="stDone">0</b><span>انجام‌شده</span></div>
      </div>
      <div class="col"><h3>بار کاری اعضا</h3><div id="loadList"></div></div>
    </section>

    <!-- ===== تب تیم ===== -->
    <section class="tab" id="tab-team">
      <div class="col">
        <h3>اعضای تیم</h3>
        <div class="toolbar" style="margin-top:8px">
          <input id="memName" placeholder="نام عضو جدید">
          <button class="btn" style="width:auto;margin:0;padding:8px 16px" id="btnAddMem">افزودن</button>
        </div>
        <div id="memList"></div>
      </div>
    </section>

    <!-- ===== تب آرشیو ===== -->
    <section class="tab" id="tab-arch">
      <div class="col">
        <h3>وظایف بایگانی‌شده</h3>
        <div id="archList"></div>
      </div>
    </section>

  </main>

  <button id="fab">+</button>
</div>

<!-- ================= مودال افزودن/ویرایش وظیفه ================= -->
<div class="overlay" id="ovTask">
  <div class="modal">
    <h3 id="mTitle">وظیفه جدید</h3>

    <label>عنوان *</label>
    <input id="fTitle">

    <label>توضیحات</label>
    <textarea id="fDesc" rows="2"></textarea>

    <div class="row2">
      <div><label>موعد (تاریخ شمسی)</label><input id="fDue" placeholder="1405/04/20"></div>
      <div><label>مسئول</label><select id="fMember"><option value="">—</option></select></div>
    </div>

    <div class="row2">
      <div><label>اهمیت (۱ تا ۵)</label>
        <select id="fImp"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
      <div><label>فوریت (۱ تا ۵)</label>
        <select id="fUrg"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
    </div>

    <div class="row2">
      <div><label>برچسب</label>
        <select id="fTag">
          <option value="">بدون برچسب</option>
          <option value="کاری">🔵 کاری</option>
          <option value="شخصی">🟢 شخصی</option>
          <option value="جلسه">🟣 جلسه</option>
          <option value="خرید">🟠 خرید</option>
          <option value="فوری">🔴 فوری</option>
        </select></div>
      <div><label>تکرار</label>
        <select id="fRep">
          <option value="">بدون تکرار</option>
          <option value="d">روزانه</option>
          <option value="w">هفتگی</option>
          <option value="m">ماهانه</option>
        </select></div>
    </div>

    <label>زیروظیفه‌ها</label>
    <div class="toolbar" style="margin:0">
      <input id="fSubIn" placeholder="مورد جدید + Enter">
    </div>
    <div class="sublist" id="fSubList"></div>

    <button class="btn" id="btnSave">💾 ذخیره</button>
    <button class="btn red" id="btnDel" style="display:none">🗑️ حذف</button>
    <button class="btn gray" id="btnClose">بستن</button>
  </div>
</div>

<script type="module">
// ================================================================
// گام ۳ : اتصال Firebase + ورود و ثبت‌نام + تب‌ها + تم تاریک
// ================================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ⬇️⬇️⬇️ این بلوک را با بلوکِ خودتان جایگزین کنید ⬇️⬇️⬇️
const firebaseConfig = {
  apiKey: "AIzaXXXXXXXXXXXXXXXXXXXXXXXX",
  authDomain: "XXXX.firebaseapp.com",
  projectId: "XXXX",
  storageBucket: "XXXX.appspot.com",
  messagingSenderId: "0000000000",
  appId: "1:0000:web:0000"
};
// ⬆️⬆️⬆️ این بلوک را با بلوکِ خودتان جایگزین کنید ⬆️⬆️⬆️

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// ---------- داده‌های برنامه (در حافظه) ----------
let DATA = { tasks: [], members: [], archive: [] };
let UID = null;          // شناسه کاربر
let unsub = null;        // قطع‌کننده گوش‌دادن به دیتابیس

// ---------- ابزار کوچک ----------
const $ = id => document.getElementById(id);
const authMsg = t => { $("authMsg").textContent = t; };

// ترجمه خطاهای Firebase به فارسی
function faErr(code){
  const m = {
    "auth/invalid-email":"ایمیل نامعتبر است",
    "auth/missing-password":"رمز عبور را وارد کنید",
    "auth/weak-password":"رمز حداقل ۶ حرف باشد",
    "auth/email-already-in-use":"این ایمیل قبلاً ثبت شده — دکمه ورود را بزنید",
    "auth/invalid-credential":"ایمیل یا رمز اشتباه است",
    "auth/user-not-found":"کاربری با این ایمیل نیست — ثبت‌نام کنید",
    "auth/wrong-password":"رمز اشتباه است",
    "auth/network-request-failed":"اینترنت وصل نیست یا فیلترشکن لازم است",
    "auth/too-many-requests":"تلاش زیاد؛ چند دقیقه صبر کنید",
    "auth/operation-not-allowed":"در کنسول Firebase روش Email/Password را فعال کنید"
  };
  return m[code] || ("خطا: " + code);
}

// ---------- ثبت‌نام ----------
$("btnSignup").onclick = async () => {
  authMsg("⏳ در حال ثبت‌نام...");
  try {
    await createUserWithEmailAndPassword(auth, $("aEmail").value.trim(), $("aPass").value);
  } catch(e){ authMsg(faErr(e.code)); }
};

// ---------- ورود ----------
$("btnLogin").onclick = async () => {
  authMsg("⏳ در حال ورود...");
  try {
    await signInWithEmailAndPassword(auth, $("aEmail").value.trim(), $("aPass").value);
  } catch(e){ authMsg(faErr(e.code)); }
};

// ---------- خروج ----------
$("btnLogout").onclick = () => signOut(auth);

// ---------- رصد وضعیت ورود ----------
onAuthStateChanged(auth, user => {
  if (user) {
    UID = user.uid;
    $("authBox").style.display = "none";
    $("app").style.display = "block";
    listenData();               // گوش دادن زنده به دیتابیس
  } else {
    UID = null;
    if (unsub) { unsub(); unsub = null; }
    $("authBox").style.display = "block";
    $("app").style.display = "none";
    authMsg("");
  }
});

// ---------- همگام‌سازی با Firestore ----------
function listenData(){
  unsub = onSnapshot(doc(db, "users", UID), snap => {
    if (snap.exists()) DATA = Object.assign({tasks:[],members:[],archive:[]}, snap.data());
    renderAll();                // تابع اصلی رسم — در گام ۴ ساخته می‌شود
  });
}

// ذخیره داده‌ها در ابر (بعد از هر تغییر صدا زده می‌شود)
async function save(){
  renderAll();
  try { await setDoc(doc(db, "users", UID), DATA); }
  catch(e){ console.log("خطای ذخیره:", e); }
}

// ---------- سوییچ تب‌ها ----------
document.querySelectorAll("nav button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll("nav button").forEach(x => x.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("show"));
    b.classList.add("active");
    $("tab-" + b.dataset.tab).classList.add("show");
  };
});

// ---------- تم تاریک/روشن ----------
$("btnTheme").onclick = () => {
  const dark = document.documentElement.dataset.theme === "dark";
  document.documentElement.dataset.theme = dark ? "" : "dark";
  $("btnTheme").textContent = dark ? "🌙" : "☀️";
  localStorage.setItem("theme", dark ? "" : "dark");
};
// بازیابی تم ذخیره‌شده هنگام باز شدن صفحه
if (localStorage.getItem("theme") === "dark") {
  document.documentElement.dataset.theme = "dark";
  $("btnTheme").textContent = "☀️";
}

// تابع موقت تا گام ۴ نیامده خطا نگیریم
function renderAll(){ if (window._render) window._render(); }

// ===== گام ۴ اینجا =====

// ===== گام ۵ اینجا =====

// ===== گام ۶ اینجا =====
</script>

</body>
</html>
